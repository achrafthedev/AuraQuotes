<!DOCTYPE html>
<html lang="en" data-theme="aurora">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraQuotes - Premium Random Quote Generator</title>

    <!-- SEO Meta Tags -->
    <meta name="description"
        content="A premium, interactive random quote generator featuring glassmorphic design, custom downloadable quote cards, text-to-speech reading, local/online modes, and custom color themes.">
    <meta name="keywords"
        content="quotes, random quote generator, developer quotes, inspirational quotes, wisdom quotes, offline quote app">
    <meta name="author" content="achrafthedev">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="AuraQuotes - Premium Random Quote Generator">
    <meta property="og:description"
        content="A premium, interactive random quote generator featuring glassmorphic design, custom downloadable quote cards, text-to-speech reading, local/online modes, and custom color themes.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">

    <!-- Styling -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Shifting Gradient Background Elements -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <!-- Main Application Wrapper -->
    <div class="app-container">

        <!-- Header -->
        <header class="app-header">
            <div class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                    class="logo-icon">
                    <path
                        d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 2.5-1 4-2 5M15 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 2.5-1 4-2 5" />
                </svg>
                <h1>AuraQuotes</h1>
            </div>

            <div class="header-controls">
                <!-- Mode Selector -->
                <div class="toggle-group" title="Switch Quote Source">
                    <button id="modeLocal" class="toggle-btn active" aria-label="Local Database Mode">
                        Local
                    </button>
                    <button id="modeOnline" class="toggle-btn" aria-label="Live API Mode">
                        Online
                    </button>
                </div>

                <!-- Theme Customizer Dropdown -->
                <div class="theme-dropdown">
                    <button id="themeDropdownTrigger" class="icon-btn" aria-label="Change Theme" title="Choose Theme">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="4" />
                            <path
                                d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" />
                        </svg>
                    </button>
                    <div id="themeDropdownMenu" class="theme-menu">
                        <button class="theme-option" data-val="aurora"><span
                                class="color-dot aurora"></span>Aurora</button>
                        <button class="theme-option" data-val="sunset"><span
                                class="color-dot sunset"></span>Sunset</button>
                        <button class="theme-option" data-val="cosmic"><span
                                class="color-dot cosmic"></span>Cosmic</button>
                        <button class="theme-option" data-val="emerald"><span
                                class="color-dot emerald"></span>Emerald</button>
                        <button class="theme-option" data-val="dark"><span class="color-dot dark"></span>Sleek
                            Dark</button>
                        <button class="theme-option" data-val="light"><span class="color-dot light"></span>Clean
                            Light</button>
                    </div>
                </div>

                <!-- Favorites Sidebar Drawer Trigger -->
                <button id="openFavorites" class="icon-btn favorites-trigger" aria-label="View Favorites"
                    title="Liked Quotes">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" />
                    </svg>
                    <span id="favCount" class="badge">0</span>
                </button>
            </div>
        </header>

        <!-- Categories Navigation -->
        <nav class="categories-nav" id="categoriesNav">
            <button class="category-pill active" data-category="all">All</button>
            <button class="category-pill" data-category="Inspirational">Inspirational</button>
            <button class="category-pill" data-category="Wisdom">Wisdom</button>
            <button class="category-pill" data-category="Life">Life</button>
            <button class="category-pill" data-category="Success">Success</button>
            <button class="category-pill" data-category="Technology">Technology</button>
            <button class="category-pill" data-category="Humor">Humor</button>
        </nav>

        <!-- Main Workspace -->
        <main class="main-content">

            <!-- Glassmorphic Quote Card -->
            <div class="quote-card-container">
                <div class="quote-card" id="quoteCard">
                    <!-- Loading Indicator Overlay -->
                    <div class="card-loader" id="cardLoader" aria-hidden="true">
                        <div class="spinner"></div>
                    </div>

                    <div class="card-content">
                        <!-- Decorative Top Quote Icon -->
                        <div class="quote-decor-open">“</div>

                        <blockquote class="quote-body">
                            <p id="quoteText">Loading your daily dose of inspiration...</p>
                        </blockquote>

                        <div class="quote-author-container">
                            <span class="author-line"></span>
                            <cite id="quoteAuthor" class="quote-author">Please wait</cite>
                        </div>

                        <div class="quote-tags">
                            <span id="quoteTag" class="tag-pill">Motivate</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Main Actions -->
            <div class="generator-controls">
                <div class="history-controls">
                    <button id="prevQuote" class="circle-btn" aria-label="Previous Quote" title="Previous Quote"
                        disabled>
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m15 18-6-6 6-6" />
                        </svg>
                    </button>
                </div>

                <button id="generateQuote" class="primary-btn">
                    <span>Next Quote</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12h14M12 5l7 7-7 7" />
                    </svg>
                </button>

                <div class="history-controls">
                    <button id="nextQuote" class="circle-btn" aria-label="Next Quote" title="Next Quote" disabled>
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m9 18 6-6-6-6" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Utility Action Strip -->
            <div class="utility-actions">
                <button id="btnVoice" class="util-btn" title="Read Quote Aloud" aria-label="Read Aloud">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="icon-speech">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
                        <path d="M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14" />
                    </svg>
                    <span>Listen</span>
                </button>

                <button id="btnCopy" class="util-btn" title="Copy to Clipboard" aria-label="Copy Quote">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="14" height="14" x="8" y="8" rx="2" ry="2" />
                        <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />
                    </svg>
                    <span>Copy</span>
                </button>

                <button id="btnShare" class="util-btn" title="Share on Twitter / X" aria-label="Share Quote">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z" />
                    </svg>
                    <span>Share</span>
                </button>

                <button id="btnDownload" class="util-btn" title="Download as Image Card" aria-label="Download Card">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" />
                    </svg>
                    <span>Card</span>
                </button>

                <button id="btnLike" class="util-btn btn-like" title="Add to Favorites" aria-label="Like Quote">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="heart-icon">
                        <path
                            d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" />
                    </svg>
                    <span>Like</span>
                </button>
            </div>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <p>Designed with premium aesthetics by <a href="https://github.com/achrafthedev" target="_blank"
                    rel="noopener noreferrer">achrafthedev</a></p>
        </footer>
    </div>

    <!-- Favorites Drawer (Off-Canvas Sidebar) -->
    <div id="favoritesDrawer" class="favorites-drawer" aria-hidden="true">
        <div class="drawer-overlay" id="drawerOverlay"></div>
        <div class="drawer-content">
            <div class="drawer-header">
                <h3>Favorite Quotes</h3>
                <button id="closeFavorites" class="close-btn" aria-label="Close Favorites Drawer">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 6 6 18M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <div class="drawer-search">
                <input type="text" id="favSearch" placeholder="Search saved quotes..." aria-label="Search Favorites">
            </div>

            <div class="drawer-body" id="favoritesListContainer">
                <div class="empty-state">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" />
                    </svg>
                    <p>No favorites saved yet. Click the "Like" button on a quote to save it here!</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden Canvas Element for Image Generation -->
    <canvas id="quoteCanvas" style="display: none;" width="1080" height="1080"></canvas>

    <!-- Floating Toast Notification Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Scripts -->
    <script src="quotes.js"></script>
    <script src="script.js"></script>
</body>

</html>
